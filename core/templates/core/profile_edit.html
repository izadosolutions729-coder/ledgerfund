{% extends 'core/base.html' %}

{% block title %}Edit Profile - LedgerFund{% endblock %}

{% block content %}
<div class="page-container" style="padding: 2rem;">
    <div class="glass-card" style="max-width: 600px; margin: auto;">
        <div class="card-header" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem;">
            <div>
                <h2 style="font-family: 'Outfit', sans-serif; font-size: 1.5rem; color: var(--text-primary); margin-bottom: 0.25rem;">Global Admin Profile</h2>
                <p style="color: var(--text-secondary); font-size: 0.9rem;">Manage your credentials and look</p>
            </div>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
        </div>

        <form method="POST" style="display: flex; flex-direction: column; gap: 1.5rem;">
            {% csrf_token %}

            <div style="text-align: center; margin-bottom: 1rem;">
                <img src="{{ u.profile_photo }}" alt="Profile" style="width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--accent-indigo); object-fit: cover; margin-bottom: 1rem;">
                <div>
                    <label for="profile_photo" style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase;">Avatar Photo URL</label>
                    <input type="text" id="profile_photo" name="profile_photo" value="{{ u.profile_photo }}" placeholder="https://..." class="form-input" style="width: 100%; margin-top: 0.5rem;">
                </div>
            </div>

            <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="first_name" class="label">First Name</label>
                    <input type="text" id="first_name" name="first_name" value="{{ u.first_name }}" class="form-input" style="width: 100%;">
                </div>
                <div class="form-group">
                    <label for="last_name" class="label">Last Name</label>
                    <input type="text" id="last_name" name="last_name" value="{{ u.last_name }}" class="form-input" style="width: 100%;">
                </div>
            </div>

            <div class="form-group">
                <label for="email" class="label">Gmail Address (for login)</label>
                <input type="email" id="email" name="email" value="{{ u.email }}" required class="form-input" style="width: 100%;">
                <p style="font-size: 0.75rem; color: var(--accent-cyan); margin-top: 0.5rem;">Note: This email will receive OTPs for your next login.</p>
            </div>

            <div class="form-group">
                <label for="password" class="label">Set New Password (optional)</label>
                <input type="password" id="password" name="password" placeholder="Leave blank to keep current" class="form-input" style="width: 100%;">
            </div>

            <div class="form-actions" style="margin-top: 1rem;">
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Update Profile & Credentials 🛡️</button>
            </div>
        </form>
    </div>
</div>

<style>
    .label { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 0.5rem; display: block; }
    .form-input { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--card-border); padding: 0.8rem 1rem; border-radius: 10px; color: var(--text-primary); font-size: 0.9rem; outline: none; transition: border-color 0.3s; }
    .form-input:focus { border-color: var(--accent-indigo); }
</style>
{% endblock %}
