{% extends 'core/base.html' %}

{% block title %}Log Meeting - LedgerFund{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Log Meeting</h1>
        <p style="color: var(--text-secondary); margin-top: 0.25rem;">Record minutes of an assembly, resolutions made, and optional attachments</p>
    </div>
    <a href="{% url 'meeting_list' %}" class="btn btn-secondary">⬅️ Back to Meetings</a>
</div>

<div class="glass-card" style="max-width: 680px; margin: auto;">
    <form method="POST" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 1.5rem;">
        {% csrf_token %}
        
        <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label for="title" style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Meeting Title</label>
            <input type="text" id="title" name="title" required placeholder="e.g. Annual General Body Meeting 2026" 
                   style="background: rgba(255, 255, 255, 0.03); border: 1px solid var(--card-border); padding: 0.8rem 1rem; border-radius: 10px; color: var(--text-primary); outline: none;">
        </div>

        <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label for="meeting_date" style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Meeting Date</label>
            <input type="date" id="meeting_date" name="meeting_date" required value="2026-05-20"
                   style="background: rgba(255, 255, 255, 0.03); border: 1px solid var(--card-border); padding: 0.8rem 1rem; border-radius: 10px; color: var(--text-primary); outline: none;">
        </div>

        <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label for="notes" style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Minutes / Decisions / Resolutions</label>
            <textarea id="notes" name="notes" rows="6" placeholder="Document the core discussion points, interest rates revisions, loan approvals, or member suspension decisions..."
                      style="background: rgba(255, 255, 255, 0.03); border: 1px solid var(--card-border); padding: 0.8rem 1rem; border-radius: 10px; color: var(--text-primary); outline: none; resize: vertical;"></textarea>
        </div>

        <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label for="attachment" style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Attachment (Resolution PDF / Scan)</label>
            <input type="file" id="attachment" name="attachment" 
                   style="background: rgba(255, 255, 255, 0.03); border: 1px solid var(--card-border); padding: 0.8rem 1rem; border-radius: 10px; color: var(--text-primary); outline: none;">
        </div>

        <button type="submit" class="btn btn-primary" style="margin-top: 0.5rem;">
            Log Meeting & Save Minutes 💾
        </button>
    </form>
</div>
{% endblock %}
