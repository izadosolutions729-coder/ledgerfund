{% extends 'core/base.html' %}

{% block title %}Issue New Loan - LedgerFund{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Issue New Loan</h1>
        <p style="color: var(--text-secondary); margin-top: 0.25rem;">Record a cash dispersion loan and automatically hook into the Ledger engine</p>
    </div>
    <a href="{% url 'loan_list' %}" class="btn btn-secondary">⬅️ Back to Loans</a>
</div>

<div class="glass-card" style="max-width: 680px; margin: auto;">
    <form method="POST" style="display: flex; flex-direction: column; gap: 1.5rem;">
        {% csrf_token %}
        
        <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label for="member_id" style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Select Borrower (Active Members)</label>
            <select id="member_id" name="member_id" required 
                    style="background: rgba(13, 16, 38, 0.9); border: 1px solid var(--card-border); padding: 0.8rem 1rem; border-radius: 10px; color: var(--text-primary); outline: none;">
                {% for member in members %}
                <option value="{{ member.id }}">{{ member.full_name }} ({{ member.member_code }})</option>
                {% endfor %}
            </select>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label for="principal_amount" style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Principal Loan Amount ($)</label>
                <input type="number" id="principal_amount" name="principal_amount" required step="0.01" value="1000.00" min="0.01"
                       style="background: rgba(255, 255, 255, 0.03); border: 1px solid var(--card-border); padding: 0.8rem 1rem; border-radius: 10px; color: var(--text-primary); outline: none;">
            </div>
            
            <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label for="interest_rate" style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Annual Interest Rate (%)</label>
                <input type="number" id="interest_rate" name="interest_rate" required step="0.01" value="12.00" min="0.00"
                       style="background: rgba(255, 255, 255, 0.03); border: 1px solid var(--card-border); padding: 0.8rem 1rem; border-radius: 10px; color: var(--text-primary); outline: none;">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label for="issued_date" style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Issued Date</label>
                <input type="date" id="issued_date" name="issued_date" required value="2026-05-20"
                       style="background: rgba(255, 255, 255, 0.03); border: 1px solid var(--card-border); padding: 0.8rem 1rem; border-radius: 10px; color: var(--text-primary); outline: none;">
            </div>
            
            <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label for="due_date" style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Maturity Due Date</label>
                <input type="date" id="due_date" name="due_date" required value="2027-05-20"
                       style="background: rgba(255, 255, 255, 0.03); border: 1px solid var(--card-border); padding: 0.8rem 1rem; border-radius: 10px; color: var(--text-primary); outline: none;">
            </div>
        </div>

        <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label for="payment_mode" style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Disbursal Payment Mode</label>
            <select id="payment_mode" name="payment_mode" required 
                    style="background: rgba(13, 16, 38, 0.9); border: 1px solid var(--card-border); padding: 0.8rem 1rem; border-radius: 10px; color: var(--text-primary); outline: none;">
                <option value="bank_transfer">Bank Transfer (Recommended)</option>
                <option value="cash">Cash disbursal</option>
                <option value="cheque">Cheque</option>
            </select>
        </div>

        <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label for="remarks" style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Loan Purpose / remarks</label>
            <textarea id="remarks" name="remarks" rows="2" placeholder="Describe the purpose or terms of the loan..."
                      style="background: rgba(255, 255, 255, 0.03); border: 1px solid var(--card-border); padding: 0.8rem 1rem; border-radius: 10px; color: var(--text-primary); outline: none; resize: vertical;"></textarea>
        </div>

        <button type="submit" class="btn btn-primary" style="margin-top: 0.5rem;">
            Disburse Loan & Generate Ledger Entries 📤
        </button>
    </form>
</div>
{% endblock %}
